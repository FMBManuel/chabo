[hf_endpoints]
embedding_endpoint_url = https://xxxxxxxxxxendpoints.huggingface.cloud
reranker_endpoint_url = https://xxxxxxxx.endpoints.huggingface.cloud
# For local TEI endpoints, set to:
# embedding_endpoint_url = http://tei-embedding:80
# reranker_endpoint_url = http://tei-reranker:80


[qdrant]
# Modes: 'native' for direct QdrantClient, 'gradio' for Gradio Gateway access
# for native just give url
# for local qdrant in docker compose pass mode=native and
# url = http://qdrant:6333, port = 6333
mode = native
url = org-name-of-space.hf.space
# NOTE: The API key should be set via QDRANT_API_KEY environment variable.
port = 443
collection = demo

[retrieval]
initial_k = 20
final_k = 5

[generator]
PROVIDER = huggingface
MODEL = https://xxxxxxxxxxx.huggingface.cloud
MAX_TOKENS = 1024
TEMPERATURE = 0.1
INFERENCE_PROVIDER = XYZ # required for provider huggingface, else parse random value
ORGANIZATION = ABC # required for provider huggingface, else parse random value
CONTEXT_META_FIELDS = filename,project_id,document_source
TITLE_META_FIELDS = filename,page
AZURE_ENDPOINT = DEF # required for provider azure, else parse random value

[ingestor]
# Size of each text chunk in characters
chunk_size = 700
# Overlap between consecutive chunks in characters
chunk_overlap = 50
# Maximum number of chunks to send to LLM (prevents context overflow)
max_chunks = 20
# Text separators for splitting, comma-separated (order of preference)
separators = \n\n,\n,. ,! ,? , ,

[conversation_history]
# Number of past user turns passed to filter extraction and generation context
MAX_TURNS = 3
# Maximum characters of conversation context passed to generation
MAX_CHARS = 8000

[metadata_filters]
# Qdrant payload field names the LLM may extract filters for, with their types.
# Format: field:type pairs, comma-separated. Types: str, int, list.
# Leave empty to disable filter extraction entirely (extract_filters node becomes a pass-through).
# Example: filterable_fields = project_id:str,year:int,tags:list
filterable_fields = crop_type:list,title:str

[query_rewriter]
# When false, the rewrite_query node is omitted from the graph
enabled = true 

# Path to the YAML DBContext file (abstract, glossary)
db_context_path = db_context.yaml

# Target language for cross-lingual rewriting ISO code (e.g. "ar" for Arabic, "en" for English)
# the rewriter translates source-language queries into target_language. 
# Leave empty to disable cross-lingual rewriting.
target_language =
